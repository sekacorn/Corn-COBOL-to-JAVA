services:
  corn-demo:
    build:
      context: .
      dockerfile: Dockerfile
    image: corn-cobol-to-java:latest
    container_name: corn-demo
    command: server
    ports:
      - "8085:8085"

    environment:
      JAVA_OPTS: "-Xmx2g -Xms512m"
      CORN_HOME: /app
      PORT: "8085"

    volumes:
      - ./samples:/app/input:ro
      - ./output:/app/output

    restart: unless-stopped

  corn-cli:
    build:
      context: .
      dockerfile: Dockerfile
    image: corn-cobol-to-java:latest
    profiles: ["cli"]
    command: cli --help
    environment:
      JAVA_OPTS: "-Xmx2g -Xms512m"
      CORN_HOME: /app
    volumes:
      - ./samples:/app/input:ro
      - ./output:/app/output
    stdin_open: true
    tty: true

networks:
  default:
    name: corn-network
    driver: bridge
